  <script src="../js/main.v20260701.js"></script>
  <script>
    async function loadAdminUsers() {
      var el=document.getElementById('adminContent');
      el.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      try {
        var d=await apiFetch('/admin/users?limit=100');
        var h='<div style="margin-bottom:0.8rem;"><input id="searchUserInput" placeholder="鎼滅储鐢ㄦ埛鍚?瀛﹀彿..." style="padding:0.4rem 0.7rem;border:1.5px solid var(--border-color);border-radius:6px;font-size:0.85rem;width:200px;" />';
        h+='<button class="btn btn-primary btn-sm" style="margin-left:0.3rem;" onclick="searchAndSetAdmin()">璁句负绠＄悊鍛?/button></div>';
        h+='<div style="font-size:0.8rem;font-weight:600;color:var(--text-tertiary);margin-bottom:0.5rem;">鐢ㄦ埛鍒楄〃</div>';
        h+='<div id="userListContainer"></div>';
        el.innerHTML=h;
        var container=document.getElementById('userListContainer');
        d.users.forEach(function(u){
          var div=document.createElement('div');div.className='review-item';
          var info=document.createElement('div');info.className='info';
          var title=document.createElement('div');title.className='title';
          title.innerHTML=(u.nickname||u.username)+' '+(u.is_admin?'<span style="font-size:0.7rem;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(232,93,58,0.1);color:var(--color-primary);font-weight:600;">绠＄悊鍛?/span>':'<span style="font-size:0.7rem;padding:0.1rem 0.4rem;border-radius:4px;background:var(--color-gray-100);color:var(--text-tertiary);">鐢ㄦ埛</span>');
          var meta=document.createElement('div');meta.className='meta';meta.textContent=u.username+' | '+(u.college||'');
          info.appendChild(title);info.appendChild(meta);div.appendChild(info);
          if(!u.is_admin){var btn=document.createElement('button');btn.className='btn btn-primary btn-sm';btn.textContent='鎻愬崌';btn.onclick=function(uid){return function(){setAdmin(uid,1);};}(u.id);div.appendChild(btn);}
          else if(u.username!='202313201025'){var btn=document.createElement('button');btn.className='btn btn-ghost btn-sm';btn.textContent='鍙栨秷';btn.onclick=function(uid){return function(){setAdmin(uid,0);};}(u.id);div.appendChild(btn);}
          container.appendChild(div);
        });
      } catch(e){el.innerHTML='<div style="padding:2rem;text-align:center;">'+e.message+'</div>';}
    }
    async function searchAndSetAdmin() {
      var q=document.getElementById('searchUserInput').value.trim();
      if(!q)return;
      try {
        var d=await apiFetch('/admin/users?keyword='+encodeURIComponent(q)+'&limit=5');
        if(!d.users||d.users.length===0){showToast('未找到用户','error');return;}
        if(d.users.length===1){setAdmin(d.users[0].id,1);return;}
        var msg=d.users.map(function(u,i){return (i+1)+'. '+u.username+' ('+(u.nickname||'')+')';}).join('\n');
        var ans=await confirmDialog({title:'閫夋嫨鐢ㄦ埛',message:'鎵惧埌澶氫釜鐢ㄦ埛锛岃杈撳叆缂栧彿锛?-'+d.users.length+'锛夛細\n'+msg,prompt:true,placeholder:'杈撳叆缂栧彿'});
        if(ans===null)return;
        var idx=parseInt(ans);
        if(idx>0&&idx<=d.users.length) setAdmin(d.users[idx-1].id,1);
      } catch(e){showToast(e.message,'error');}
    }
    async function setAdmin(username,isAdmin) {
      try {
        await apiFetch('/admin/users/'+username+'/role',{method:'PUT',body:{is_admin:isAdmin,admin_role:isAdmin?'admin':''}});
        showToast(isAdmin?'宸茶涓虹鐞嗗憳':'宸插彇娑堢鐞嗗憳');
        loadAdminUsers();
      } catch(e){showToast(e.message,'error');}
    }

    function ready(fn) { if (document.readyState !== 'loading') setTimeout(fn,30); else document.addEventListener('DOMContentLoaded',function(){setTimeout(fn,30);}); }

    ready(function() {
      updateNavAuth();
      if (!getToken()) { document.getElementById('adminContent').innerHTML = '<div style="text-align:center;padding:3rem;">璇蜂互绠＄悊鍛樿韩浠界櫥褰?/div>'; return; }
      loadStats();
      loadPending();
    });

    document.getElementById('adminTabs').addEventListener('click', function(e) {
      var b = e.target.closest('.tab'); if (!b) return;
      document.querySelectorAll('#adminTabs .tab').forEach(function(t){t.classList.remove('active');});
      b.classList.add('active');
      if (b.dataset.tab === 'pending') loadPending();
      else if (b.dataset.tab === 'activities') loadAllActivities();
      else if (b.dataset.tab === 'clubs') loadAllClubsAdmin();
      else if (b.dataset.tab === 'messages') loadPendingMessages();
      else if (b.dataset.tab === 'admins') loadAdminUsers();
      else if (b.dataset.tab === 'contributions') loadContributions();
      else if (b.dataset.tab === 'info') loadPendingInfo();
      else if (b.dataset.tab === 'logs') loadOperationLogs();
      else if (b.dataset.tab === 'claims') loadPendingClaims();
      else if (b.dataset.tab === 'images') loadPendingImages();
      else if (b.dataset.tab === 'club-pending') loadClubPendingReview();
    });

    function loadStats() {
      apiFetch('/admin/stats').then(function(d) {
        var cards = document.querySelectorAll('#statsRow .stat-card');
        if (cards.length >= 4) {
          cards[0].querySelector('.stat-num').textContent = d.users;
          cards[1].querySelector('.stat-num').textContent = d.clubs;
          cards[2].querySelector('.stat-num').textContent = d.activities;
          cards[3].querySelector('.stat-num').textContent = d.pending_activities;
        }
      }).catch(function(){});
    }

    function loadPending() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      apiFetch('/admin/activities?status=pending').then(function(d) {
        if (d.activities.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);font-size:0.9rem;">鏆傛棤寰呭鏍告椿鍔?/div>'; return; }
        var h = '';
        d.activities.forEach(function(a) {
          var _at = a.time ? ' ' + a.time : '';
          h += '<div class="review-item"><div class="info"><div class="title">' + (a.emoji||'馃搮') + ' ' + a.title + '</div><div class="meta">' + (a.creator_name||'') + ' | ' + (a.date||'') + _at + '</div></div><button class="btn btn-primary btn-sm" onclick="reviewActivity(' + a.id + ',\'approve\')">閫氳繃</button><button class="btn btn-ghost btn-sm" onclick="reviewActivity(' + a.id + ',\'reject\')">鎷掔粷</button></div>';
        });
        el.innerHTML = h;
      }).catch(function(e) { el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-tertiary);">' + e.message + '</div>'; });
    }

    function loadAllActivities() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      apiFetch('/admin/activities?status=approved').then(function(d) {
        if (d.activities.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤娲诲姩</div>'; return; }
        var h = '';
        d.activities.forEach(function(a) {
          var _at = a.time ? ' ' + a.time : '';
          h += '<div class="review-item"><div class="info"><div class="title">' + (a.emoji||'馃搮') + ' ' + a.title + '</div><div class="meta">' + (a.creator_name||'') + ' | ' + (a.date||'') + _at + '</div></div><button class="btn btn-ghost btn-sm" onclick="reviewActivity(' + a.id + ',\'reject\')">椹冲洖</button><button class="btn btn-ghost btn-sm" style="color:var(--color-danger);" onclick="deleteActivity(' + a.id + ')">鍒犻櫎</button></div>';
        });
        el.innerHTML = h;
      }).catch(function(e) { el.innerHTML = '<div style="padding:2rem;">' + e.message + '</div>'; });
    }

    function clubTypeLabel(type) {
      if (type === 'interest_group') return '兴趣组';
      if (type === 'department') return '部门';
      return '社团';
    }

    function loadAllClubsAdmin() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      apiFetch('/admin/clubs').then(function(d) {
        if (d.clubs.length === 0) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤缁勭粐</div>'; return; }
        var h = '';
        d.clubs.forEach(function(c) {
          h += '<div class="review-item"><div class="info"><div class="title">' + c.emoji + ' ' + c.name + '</div><div class="meta">' + clubTypeLabel(c.type) + ' | ' + (c.tag||'') + ' | ' + c.members + '浜?/div></div><a href="club-manage.html?id=' + c.id + '" class="btn btn-ghost btn-sm">缂栬緫</a><button class="btn btn-ghost btn-sm" style="color:var(--color-danger);" onclick="deleteAdminClub(' + c.id + ')">鍒犻櫎</button></div>';
        });
        el.innerHTML = h;
      }).catch(function(e) { el.innerHTML = '<div style="padding:2rem;">' + e.message + '</div>'; });
    }

    async function loadPendingMessages() {
      var el=document.getElementById('adminContent');
      el.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      try {
        var d=await apiFetch('/messages/pending');
        if(!d.messages||!d.messages.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤寰呭鏍哥暀瑷€</div>';return;}
        var h='';
        d.messages.forEach(function(m){
          h+='<div class="review-item"><div class="info"><div class="title">'+m.nickname+'</div><div class="meta">'+m.content+'</div></div><button class="btn btn-primary btn-sm" onclick="reviewMessage('+m.id+',\'approve\')">閫氳繃</button><button class="btn btn-ghost btn-sm" onclick="reviewMessage('+m.id+',\'reject\')">鎷掔粷</button></div>';
        });
        el.innerHTML=h;
      } catch(e){el.innerHTML='<div style="text-align:center;padding:2rem;">'+e.message+'</div>';}
    }
    async function loadPendingImages() {
      var el=document.getElementById('adminContent');
      el.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      try {
        var d=await apiFetch('/upload/pending');
        if(!d.images||!d.images.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤寰呭鏍稿浘鐗?/div>';return;}
        var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.6rem;">';
        d.images.forEach(function(img){
          h+='<div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden;">';
          h+='<div style="height:140px;background:var(--color-gray-100);display:flex;align-items:center;justify-content:center;overflow:hidden;">';
          h+='<img src="'+img.url+'" style="max-width:100%;max-height:100%;object-fit:cover;" />';
          h+='</div><div style="padding:0.5rem;">';
          h+='<div style="font-size:0.78rem;color:var(--text-tertiary);">'+(img.nickname||img.username||'')+'</div>';
          h+='<div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.4rem;">'+img.type+' | '+img.created_at+'</div>';
          h+='<div style="display:flex;gap:0.3rem;"><button class="btn btn-primary btn-sm" style="flex:1;" onclick="reviewImage('+img.id+',\'approve\')">閫氳繃</button><button class="btn btn-ghost btn-sm" style="flex:1;" onclick="reviewImage('+img.id+',\'reject\')">鎷掔粷</button></div>';
          h+='</div></div>';
        });
        h+='</div>';
        el.innerHTML=h;
      } catch(e){el.innerHTML='<div style="text-align:center;padding:2rem;">'+e.message+'</div>';}
    }
    async function reviewImage(id,action) {
      try {
        await apiFetch('/upload/'+id+'/review',{method:'POST',body:{action:action}});
        showToast(action==='approve'?'已通过':'已拒绝');
        loadPendingImages();
      } catch(e){showToast(e.message,'error');}
    }
    function infoCategoryName(cat) {
      var map = { clothing:'Clothing', food:'Food', housing:'Housing', travel:'Travel', weather:'Weather', calendar:'Calendar', study:'Study', life:'Life', notice:'Notice', other:'Other' };
      return map[cat] || 'Other';
    }
    async function loadPendingInfo() {
      var el=document.getElementById('adminContent');
      el.innerHTML='<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      try {
        var d=await apiFetch('/info/pending?status=pending');
        if(!d.cards||!d.cards.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤寰呭鏍告牎鍥俊鎭?/div>';return;}
        var h='';
        d.cards.forEach(function(card){
          h+='<div class="review-item"><div class="info"><div class="title">馃搶 '+(card.title||'')+'</div>';
          h+='<div class="meta">'+infoCategoryName(card.category)+' | '+(card.nickname||card.username||'鍖垮悕')+' | '+(card.created_at||'')+'</div>';
          h+='<div class="meta" style="margin-top:.35rem;padding:.45rem .6rem;background:var(--color-gray-50);border-radius:8px;white-space:pre-wrap;">'+((card.summary||card.content||'').substring(0,180))+'</div>';
          if(card.location) h+='<div class="meta">馃搷 '+card.location+'</div>';
          h+='</div><button class="btn btn-primary btn-sm" onclick="reviewInfoCard('+card.id+',&quot;approve&quot;)">通过</button><button class="btn btn-ghost btn-sm" onclick="reviewInfoCard('+card.id+',&quot;reject&quot;)">拒绝</button></div>';
        });
        el.innerHTML=h;
      } catch(e){el.innerHTML='<div style="text-align:center;padding:2rem;">'+e.message+'</div>';}
    }
    async function reviewInfoCard(id, action) {
      try {
        await apiFetch('/info/'+id+'/review',{method:'POST',body:{action:action}});
        showToast(action==='approve'?'已通过':'已拒绝');
        loadPendingInfo();
      } catch(e){showToast(e.message,'error');}
    }
    async function reviewMessage(id,action) {
      try {
        await apiFetch('/messages/'+id+'/review',{method:'POST',body:{action:action}});
        showToast(action==='approve'?'已通过':'已拒绝');
        loadPendingMessages();
      } catch(e){showToast(e.message,'error');}
    }
    async function reviewActivity(id, action) {
      try {
        await apiFetch('/admin/activities/' + id + '/review', { method: 'POST', body: { action: action } });
        showToast(action === 'approve' ? '已通过' : '已拒绝');
        loadPending();
        loadStats();
      } catch(e) { showToast(e.message, 'error'); }
    }
    function deleteAdminClub(id) {
      if (!confirm('确定删除该组织吗？')) return;
      apiFetch('/admin/clubs/'+id,{method:'DELETE'}).then(function(){showToast('已删除');loadAllClubsAdmin();}).catch(function(e){showToast(e.message,'error');});
    }
    async function loadPendingClaims() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      var tabs = '<div style="display:flex;gap:.3rem;margin-bottom:.8rem;"><button class="btn btn-sm btn-primary" onclick="loadPendingClaims()">寰呭鐞?/button><button class="btn btn-sm btn-ghost" onclick="loadAllClaims()">鍏ㄩ儴</button></div>';
      try {
        var d = await apiFetch('/clubs/claims/pending?status=pending');
        if (!d.claims || !d.claims.length) { el.innerHTML = tabs + '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤寰呭鐞嗙殑璁ら鐢宠</div>'; return; }
        var h = tabs;
        d.claims.forEach(function(cl){
          h += '<div class="review-item"><div class="info"><div class="title">' + (cl.club_emoji||'馃帾') + ' ' + (cl.club_name||'') + '</div><div class="meta">馃彿锔?璁ら浜猴細' + (cl.nickname||cl.username||'') + ' | ' + cl.created_at + '</div>' + (cl.message ? '<div class="meta" style="margin-top:.2rem;padding:.3rem .5rem;background:var(--color-gray-50);border-radius:4px;font-size:.8rem;">馃摑 ' + cl.message + '</div>' : '') + (cl.images && cl.images !== 'null' ? '<div class="meta" style="margin-top:.3rem;display:flex;gap:.3rem;flex-wrap:wrap;">' + function(){try{return JSON.parse(cl.images).map(function(im){return '<img src="'+im+'" style="width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid var(--border-color);cursor:pointer;" onclick="window.open(\''+im+'\')" />';}).join('');}catch(e){return'';}}() + '</div>' : '') + '</div><button class="btn btn-primary btn-sm" onclick="reviewClaim(' + cl.id + ',\'approve\')">閫氳繃</button><button class="btn btn-ghost btn-sm" onclick="reviewClaim(' + cl.id + ',\'reject\')">鎷掔粷</button></div>';
        });
        el.innerHTML = h;
      } catch(e) { el.innerHTML = tabs + '<div style="padding:2rem;">' + e.message + '</div>'; }
    }
    async function loadAllClaims() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      var tabs = '<div style="display:flex;gap:.3rem;margin-bottom:.8rem;"><button class="btn btn-sm btn-ghost" onclick="loadPendingClaims()">寰呭鐞?/button><button class="btn btn-sm btn-primary" onclick="loadAllClaims()">鍏ㄩ儴</button></div>';
      try {
        var d = await apiFetch('/clubs/claims/pending?status=all');
        if (!d.claims || !d.claims.length) { el.innerHTML = tabs + '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤璁ら璁板綍</div>'; return; }
        var h = tabs;
        d.claims.forEach(function(cl){
          var st = cl.status === 'approved' ? '已通过' : cl.status === 'rejected' ? '已拒绝' : '待处理';
          h += '<div class="review-item"><div class="info"><div class="title">' + (cl.club_emoji||'馃帾') + ' ' + (cl.club_name||'') + ' ' + st + '</div><div class="meta">馃彿锔?' + (cl.nickname||cl.username||'') + ' | ' + cl.created_at + '</div></div></div>';
        });
        el.innerHTML = h;
      } catch(e) { el.innerHTML = tabs + '<div style="padding:2rem;">' + e.message + '</div>'; }
    }
    async function reviewClaim(id, action) {
      try {
        await apiFetch('/clubs/claims/' + id + '/review', { method: 'POST', body: { action: action } });
        showToast(action === 'approve' ? '已通过' : '已拒绝');
        loadPendingClaims();
      } catch(e) { showToast(e.message, 'error'); }
    }

    async function deleteActivity(id) {
      if (!await confirmDialog({icon:'删除',title:'删除活动',message:'确定删除该活动吗？此操作不可撤销。',confirmText:'删除',danger:true})) return;
      try {
        await apiFetch('/admin/activities/' + id, { method: 'DELETE' });
        showToast('已删除');
        loadAllActivities();
        loadStats();
      } catch(e) { showToast(e.message, 'error'); }
    }

    var contribStatus = 'pending';
    function loadContributions() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      var tabs = '<div style="display:flex;gap:.3rem;margin-bottom:.8rem;"><button class="btn btn-sm ' + (contribStatus==='pending'?'btn-primary':'btn-ghost') + '" onclick="contribStatus=\'pending\';loadContributions()">寰呭鐞?/button><button class="btn btn-sm ' + (contribStatus==='approved'?'btn-primary':'btn-ghost') + '" onclick="contribStatus=\'approved\';loadContributions()">宸查噰绾?/button><button class="btn btn-sm ' + (contribStatus==='rejected'?'btn-primary':'btn-ghost') + '" onclick="contribStatus=\'rejected\';loadContributions()">宸叉嫆缁?/button><button class="btn btn-sm ' + (contribStatus==='all'?'btn-primary':'btn-ghost') + '" onclick="contribStatus=\'all\';loadContributions()">鍏ㄩ儴</button></div>';
      apiFetch('/clubs/contributions/all?status=' + contribStatus).then(function(d) {
        if (!d.contributions || !d.contributions.length) { el.innerHTML = tabs + '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤璐＄尞璁板綍</div>'; return; }
        var h = tabs;
        d.contributions.forEach(function(c){
          var typeLabel = c.type === 'question' ? '鉂?鐤戦棶' : '馃摑 琛ュ厖';
          var statusLabel = c.status === 'approved' ? '已通过' : c.status === 'rejected' ? '已拒绝' : '待处理';
          var actions = '';
          if (c.status === 'pending') actions = '<button class="btn btn-primary btn-sm" onclick="reviewContribution(' + c.id + ',\'approve\')">閲囩撼</button><button class="btn btn-ghost btn-sm" onclick="reviewContribution(' + c.id + ',\'reject\')">鎷掔粷</button>';
          else actions = '<button class="btn btn-ghost btn-sm" onclick="reviewContribution(' + c.id + ',\'' + (c.status==='approved'?'reject':'approve') + '\')">' + (c.status==='approved'?'鎾ら攢閲囩撼':'閲嶆柊閲囩撼') + '</button>';
          h += '<div class="review-item"><div class="info"><div class="title">' + (c.club_emoji||'馃帾') + ' ' + (c.club_name||'') + ' ' + statusLabel + '</div><div class="meta">' + typeLabel + ' | ' + (c.nickname||'鍖垮悕') + ' | ' + (c.field||'缁煎悎') + '</div><div class="meta" style="margin-top:.2rem;padding:.3rem .5rem;background:var(--color-gray-50);border-radius:4px;">' + (c.content||'') + '</div></div>' + actions + '</div>';
        });
        el.innerHTML = h;
      }).catch(function(e) { el.innerHTML = tabs + '<div style="padding:2rem;">' + e.message + '</div>'; });
    }
    async function reviewContribution(id, action) {
      try {
        await apiFetch('/clubs/contributions/' + id + '/review', { method: 'POST', body: { action: action } });
        showToast(action === 'approve' ? '已采纳' : '已拒绝');
        loadContributions();
      } catch(e) { showToast(e.message, 'error'); }
    }
    var clubPendingStatus = 'pending';
async function loadClubPendingReview() {
  var el = document.getElementById('adminContent');
  el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
  var tabs = '<div style="display:flex;gap:.3rem;margin-bottom:.8rem;"><button class="btn btn-sm ' + (clubPendingStatus==='pending'?'btn-primary':'btn-ghost') + '" onclick="clubPendingStatus=\'pending\';loadClubPendingReview()">寰呭鏍?/button><button class="btn btn-sm ' + (clubPendingStatus==='approved'?'btn-primary':'btn-ghost') + '" onclick="clubPendingStatus=\'approved\';loadClubPendingReview()">宸查€氳繃</button><button class="btn btn-sm ' + (clubPendingStatus==='rejected'?'btn-primary':'btn-ghost') + '" onclick="clubPendingStatus=\'rejected\';loadClubPendingReview()">宸叉嫆缁?/button><button class="btn btn-sm ' + (clubPendingStatus==='all'?'btn-primary':'btn-ghost') + '" onclick="clubPendingStatus=\'all\';loadClubPendingReview()">鍏ㄩ儴</button></div>';
  try {
    var d = await apiFetch('/admin/clubs/pending?status=' + clubPendingStatus);
    if (!d.clubs || !d.clubs.length) { el.innerHTML = tabs + '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤鍏ラ┗鐢宠</div>'; return; }
    var h = tabs;
    d.clubs.forEach(function(c){
          var statusLabel = c.status === 'approved' ? '已通过' : c.status === 'rejected' ? '已拒绝' : '待处理';
      var actions = '';
      if (c.status === 'pending') {
        actions = '<button class="btn btn-primary btn-sm" onclick="reviewClubPending(' + c.id + ',\'approve\')">閫氳繃</button><button class="btn btn-ghost btn-sm" onclick="reviewClubPending(' + c.id + ',\'reject\')">鎷掔粷</button>';
      }
      h += '<div class="review-item"><div class="info"><div class="title">' + (c.emoji||'馃帾') + ' ' + c.name + ' ' + statusLabel + '</div><div class="meta">' + clubTypeLabel(c.type) + ' | 馃彿锔?鍒涘缓浜猴細' + (c.creator_nickname||c.creator_name||'') + ' | ' + (c.created_at||'') + '</div>' + (c.description ? '<div class="meta" style="margin-top:.2rem;padding:.3rem .5rem;background:var(--color-gray-50);border-radius:4px;font-size:.8rem;">' + c.description.substring(0,100) + '</div>' : '') + '</div>' + actions + '</div>';
    });
    el.innerHTML = h;
  } catch(e) { el.innerHTML = tabs + '<div style="padding:2rem;">' + e.message + '</div>'; }
}
async function reviewClubPending(id, action) {
  try {
    var reason = '';
    if (action === 'reject') {
      reason = (await confirmDialog({icon:'拒绝',title:'拒绝理由',message:'请输入拒绝原因（可选）：',prompt:true,placeholder:'理由',confirmText:'确认拒绝'})) || '';
    }
    await apiFetch('/admin/clubs/' + id + '/review', { method: 'POST', body: { action: action, reject_reason: reason } });
        showToast(action === 'approve' ? '已通过' : '已拒绝');
    loadClubPendingReview();
  } catch(e) { showToast(e.message, 'error'); }
}
async function loadOperationLogs() {
      var el = document.getElementById('adminContent');
      el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>鍔犺浇涓?..</p></div>';
      try {
        var d = await apiFetch('/clubs/logs');
        if (!d.logs || !d.logs.length) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-tertiary);">鏆傛棤鎿嶄綔鏃ュ織</div>'; return; }
        var h = '<div style="font-size:.8rem;color:var(--text-tertiary);margin-bottom:.5rem;">鍏?' + d.logs.length + ' 鏉¤褰?/div>';
        d.logs.forEach(function(l){
          var time = l.created_at ? l.created_at.substring(0,19).replace('T',' ') : '';
          h += '<div class="review-item"><div class="info"><div class="meta" style="font-size:.75rem;"><span style="font-weight:600;">' + (l.username||'') + '</span> <span style="color:var(--text-tertiary);">' + time + '</span></div><div class="title" style="font-size:.82rem;font-weight:500;">' + l.action + '</div></div></div>';
        });
        el.innerHTML = h;
      } catch(e) { el.innerHTML = '<div style="padding:2rem;">' + e.message + '</div>'; }
    }
