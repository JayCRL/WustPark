<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校园寄语 · Wust Spark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.v91.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #070714 0%, #12082a 25%, #0d0d20 55%, #070714 100%);
      overflow-x: hidden; min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
    }
    .msg-wrap { padding-top: 64px; min-height: 100vh; position: relative; }

    /* 星空粒子背景 */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite alternate; opacity: 0.3; }
    @keyframes twinkle { 0% { opacity: 0.1; transform: scale(0.8); } 100% { opacity: 0.8; transform: scale(1.2); } }

    /* 光晕装饰 */
    .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0.3; }
    .glow-orb-1 { width: 400px; height: 400px; background: #E85D3A; top: -100px; left: -100px; animation: orbFloat 12s ease-in-out infinite alternate; }
    .glow-orb-2 { width: 350px; height: 350px; background: #D97706; bottom: -100px; right: -100px; animation: orbFloat 15s ease-in-out infinite alternate-reverse; }
    .glow-orb-3 { width: 250px; height: 250px; background: #06D6A0; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orbFloat 10s ease-in-out infinite alternate; opacity: 0.15; }
    @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,-40px) scale(1.2); } }

    /* 顶部 - 玻璃卡片 */
    .msg-header {
      position: relative; z-index: 2; text-align: center;
      padding: 1.5rem 1.5rem 1rem;
      max-width: 500px; margin: 1.2rem auto 0;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; backdrop-filter: blur(16px);
    }
    .msg-header::before {
      content: ''; position: absolute; inset: -1px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(232,93,58,0.3), transparent, rgba(217,119,6,0.25));
      z-index: -1; mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      padding: 1px;
    }
    .msg-header h1 {
      font-size: 1.5rem; font-weight: 900;
      background: linear-gradient(135deg, #FF6B35, #F7C948, #FF4757);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .msg-header p { font-size: 0.78rem; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; margin-top: 0.25rem; }
    .msg-header .header-deco { font-size: 0.7rem; color: rgba(255,255,255,0.12); margin-top: 0.3rem; letter-spacing: 0.2em; }

    /* 板块 Tab - 玻璃胶囊 */
    .board-tabs {
      position: relative; z-index: 2;
      display: flex; gap: 0.3rem; padding: 0.8rem 1rem 0.2rem;
      overflow-x: auto; justify-content: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .board-tabs::-webkit-scrollbar { display: none; }
    .board-tab {
      padding: 0.4rem 1rem; border: none;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.3); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; border-radius: 20px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap; backdrop-filter: blur(8px);
      border: 1px solid transparent;
    }
    .board-tab:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }
    .board-tab.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(232,93,58,0.25), rgba(217,119,6,0.12));
      border-color: rgba(232,93,58,0.25);
      box-shadow: 0 0 20px rgba(232,93,58,0.12), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* 控制栏 */
    .controls {
      position: relative; z-index: 2;
      display: flex; gap: 0.4rem; padding: 0.4rem 1rem;
      flex-wrap: wrap; justify-content: center;
    }
    .controls select, .controls input, .controls button {
      padding: 0.35rem 0.75rem; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem; backdrop-filter: blur(8px);
      outline: none; transition: all 0.25s;
    }
    .controls select:focus, .controls input:focus { border-color: rgba(232,93,58,0.35); background: rgba(255,255,255,0.06); }
    .controls select option { background: #12122a; color: white; }
    .controls button {
      background: linear-gradient(135deg, rgba(232,93,58,0.2), rgba(217,119,6,0.1));
      border-color: rgba(232,93,58,0.2); color: white;
      cursor: pointer; font-weight: 600;
    }
    .controls button:hover { background: linear-gradient(135deg, rgba(232,93,58,0.35), rgba(217,119,6,0.2)); }

    /* 舞台 - 弹幕区 */
    #stage {
      position: relative; z-index: 1;
      width: calc(100% - 16px); max-width: 900px;
      height: calc(100vh - 290px); overflow: hidden;
      min-height: 280px; margin: 0.3rem auto;
      border-radius: 16px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 70%);
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.3), 0 0 40px rgba(232,93,58,0.03);
    }
    #stage::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(7,7,20,0.4) 0%, transparent 15%, transparent 85%, rgba(7,7,20,0.4) 100%);
      pointer-events: none; z-index: 2;
    }

    /* 弹幕 */
    .bullet {
      position: absolute; white-space: nowrap;
      padding: 0.3rem 1rem; border-radius: 20px;
      animation: flyLeft linear infinite;
      pointer-events: none; z-index: 1; opacity: 0.7;
      font-size: 0.95rem; font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .bullet .b-nick {
      font-size: 0.65rem; opacity: 0.5; margin-right: 0.35rem;
      font-weight: 500; letter-spacing: 0.05em;
    }
    .bullet.highlight {
      z-index: 5; font-size: 1.2rem;
      border: 1px solid rgba(232,93,58,0.3);
      box-shadow: 0 0 30px rgba(232,93,58,0.15), inset 0 0 30px rgba(232,93,58,0.04);
      opacity: 1; font-weight: 800;
      background: linear-gradient(135deg, rgba(232,93,58,0.12), rgba(217,119,6,0.06));
      backdrop-filter: blur(10px);
      text-shadow: 0 0 20px rgba(232,93,58,0.2);
    }
    @keyframes flyLeft {
      0% { transform: translateX(calc(100vw + 40px)); }
      100% { transform: translateX(-100%); }
    }

    /* 发布区 - 玻璃卡片 */
    .post-wrap {
      position: relative; z-index: 2;
      max-width: 860px; margin: 0.4rem auto 0;
      padding: 0 0.8rem;
    }
    .post-area {
      display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }
    .post-area input, .post-area select {
      padding: 0.45rem 0.8rem; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: white; font-size: 0.82rem;
      outline: none; transition: all 0.2s;
    }
    .post-area input:focus, .post-area select:focus { border-color: rgba(232,93,58,0.35); background: rgba(255,255,255,0.06); }
    .post-area input::placeholder { color: rgba(255,255,255,0.18); }
    .post-area select option { background: #12122a; color: white; }
    .post-area .send-btn {
      padding: 0.45rem 1.2rem; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #E85D3A, #FF6B35);
      color: white; font-weight: 700; cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 20px rgba(232,93,58,0.25);
    }
    .post-area .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(232,93,58,0.4);
    }

    /* 提示文字 */
    .empty-hint { text-align: center; padding: 3rem; color: rgba(255,255,255,0.15); font-size: 0.85rem; position: relative; z-index: 3; }
    .empty-hint span { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

    /* Loading */
    .loading-spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.04); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 2rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Navbar override */
    .navbar { background: rgba(7,7,20,0.85) !important; backdrop-filter: blur(16px) !important; border-bottom: 1px solid rgba(255,255,255,0.04) !important; }
    .navbar-logo { color: #fff !important; }
    .navbar-links a:not(.btn) { color: rgba(255,255,255,0.5) !important; font-size: 0.85rem !important; }
    .navbar-links a:not(.btn):hover { color: #fff !important; background: rgba(255,255,255,0.06) !important; }

    @media (max-width: 768px) {
      #stage { height: calc(100vh - 310px); border-radius: 0; width: 100%; }
      .msg-header { margin-left: 0.5rem; margin-right: 0.5rem; }
    }
  </style>
</head>
<body class="msg-theme">
  <!-- 光晕装饰 -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="glow-orb glow-orb-3"></div>
  <!-- 星空背景 -->
  <div class="stars" id="stars"></div>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo"><span class="logo-icon">✨</span>Wust Spark</a>
      <div class="navbar-links">
        <a href="index.html">首页</a>
        <a href="clubs.html">社团</a>
        <a href="activities.html">活动</a>
        <span id="navAuth"></span>
      </div>
    </div>
  </nav>

  <div class="msg-wrap">
    <div class="msg-header">
      <h1>✦ 校园寄语板 ✦</h1>
      <p>青春有迹 · 留言有声</p>
      <div class="header-deco">— 每一句话都是星光 —</div>
    </div>

    <div class="board-tabs" id="boardTabs"></div>
    <div class="controls">
      <select id="gradeFilter" onchange="reload()">
        <option value="all">🎯 全部年级</option>
        <option value="2022级">2022级（本科毕业）</option>
        <option value="研三">🎓 研三（研究生毕业）</option>
        <option value="2023级">2023级</option>
        <option value="2024级">2024级</option>
        <option value="2025级">2025级</option>
        <option value="2026级">2026级</option>
        <option value="研二">🎓 研二</option>
        <option value="研一">🎓 研一</option>
        <option value="博士">🎓 博士</option>
      </select>
      <input type="text" id="highlightSid" placeholder="🔍 高亮" style="width:90px;" />
      <button onclick="reload()">🔄 刷新</button>
    </div>

    <div id="stage"><div class="empty-hint"><span>💬</span>加载留言中...</div></div>

    <div class="post-wrap">
      <div class="post-area">
        <input type="text" id="msgInput" placeholder="写下你的寄语..." style="flex:2;min-width:140px;" />
        <input type="text" id="msgName" placeholder="昵称" style="width:100px;" />
        <input type="text" id="msgSid" placeholder="学号" style="width:70px;" />
        <select id="msgGrade">
          <option value="">年级</option>
          <option value="2022级">2022级</option>
          <option value="研三">研三</option>
          <option value="2023级">2023级</option>
          <option value="2024级">2024级</option>
          <option value="2025级">2025级</option>
          <option value="2026级">2026级</option>
          <option value="研二">研二</option>
          <option value="研一">研一</option>
          <option value="博士">博士</option>
        </select>
        <button class="send-btn" onclick="postMsg()">发送 ✨</button>
      </div>
    </div>
  </div>

  <nav class="mobile-bottom-nav" id="bottomNav" style="background:rgba(7,7,20,0.95);border-top-color:rgba(255,255,255,0.04);">
    <a href="index.html" style="color:rgba(255,255,255,0.4);font-size:0.6rem;">🏠<br>首页</a>
    <a href="clubs.html" style="color:rgba(255,255,255,0.4);font-size:0.6rem;">🎪<br>社团</a>
    <a href="activities.html" style="color:rgba(255,255,255,0.4);font-size:0.6rem;">📅<br>活动</a>
    <a href="messages.html" style="color:#FF6B35;font-size:0.6rem;">💬<br>寄语</a>
    <a href="profile.html" style="color:rgba(255,255,255,0.4);font-size:0.6rem;">👤<br>我的</a>
  </nav>

  <script src="js/main.js?v=88"></script>
  <script>
    var currentBoard = 'general', currentCampus = '', currentCollege = '', colleges = [];
    var msgColors = ['#FF6B35','#D97706','#06D6A0','#3B9BD5','#F7C948','#FF4757','#F59E0B','#4ADE80','#FF8F5E','#E85D3A','#2DC4A5','#FFD93D'];

    // 生成星空
    (function(){
      for(var i=0;i<80;i++){
        var s=document.createElement('div');s.className='star';
        s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
        s.style.width=s.style.height=(Math.random()*2+1)+'px';
        s.style.setProperty('--d',(Math.random()*3+2)+'s');
        s.style.animationDelay=Math.random()*5+'s';
        document.getElementById('stars').appendChild(s);
      }
    })();

    function ready(fn){if(document.readyState!=='loading')setTimeout(fn,30);else document.addEventListener('DOMContentLoaded',function(){setTimeout(fn,30);});}
    ready(function(){
      loadColleges();initBoards();
      setTimeout(reload, 100);
      setInterval(reload, 25000);
    });

    function initBoards(){
      var tabs=document.getElementById('boardTabs');
      [['general','🌐 全部'],['campus','🏫 黄家湖'],['campus','🏛️ 青山'],['college','🏛️ 学院']].forEach(function(b,i){
        var btn=document.createElement('button');btn.className='board-tab'+(i===0?' active':'');btn.textContent=b[1];
        btn.dataset.board=b[0];
        if(b[0]==='campus')btn.dataset.campus=i===1?'黄家湖':'青山';
        if(b[0]==='college')btn.dataset.college='all';
        btn.onclick=function(){switchBoard(b[0],this.dataset.campus||'',this.dataset.college||'');};
        tabs.appendChild(btn);
      });
    }

    function switchBoard(board,campus,college){
      document.querySelectorAll('.board-tab').forEach(function(t){t.classList.remove('active');});
      event.target.classList.add('active');
      currentBoard=board;currentCampus=campus;currentCollege=college;
      var sel=document.getElementById('collegeSelector');
      if(board==='college'){
        if(!sel){
          sel=document.createElement('select');sel.id='collegeSelector';
          sel.style.cssText='padding:0.35rem 0.7rem;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);font-size:0.78rem;';
          sel.onchange=function(){currentCollege=this.value;reload();};
          colleges.forEach(function(c){sel.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';});
          document.querySelector('.controls').prepend(sel);
        }
      }else if(sel)sel.remove();
      reload();
    }

    function loadColleges(){
      fetch('/club-api/categories?level=1').then(function(r){return r.json()}).then(function(d){
        colleges=(d.flat||d).filter(function(c){return c.level===1;});
      }).catch(function(){});
    }

    function reload(){
      var grade=document.getElementById('gradeFilter').value,hlSid=document.getElementById('highlightSid').value.trim();
      var stage=document.getElementById('stage');
      stage.innerHTML='<div class="loading-spinner" style="margin:3rem auto;"></div>';
      var params='?grade='+grade+'&limit=80&board='+currentBoard;
      if(currentCampus)params+='&campus='+encodeURIComponent(currentCampus);
      if(currentCollege)params+='&college_id='+currentCollege;

      apiFetch('/messages'+params).then(function(d){
        stage.innerHTML='';
        if(!d.messages||!d.messages.length){stage.innerHTML='<div class="empty-hint"><span>💬</span>暂无寄语</div>';return;}
        startBullets(d.messages,hlSid);
      }).catch(function(){stage.innerHTML='<div class="empty-hint"><span>⚠️</span>加载失败</div>';});
    }

    function startBullets(msgs,hlSid){
      var stage=document.getElementById('stage'),h=stage.clientHeight||400,w=window.innerWidth||document.documentElement.clientWidth;
      for(var i=0;i<Math.min(msgs.length,60);i++){
        var m=msgs[i],isHl=hlSid&&(m.student_id===hlSid||(m.display_name||m.nickname)===hlSid);
        var color=msgColors[Math.floor(Math.random()*msgColors.length)];
        var speed=isHl?(5+Math.random()*2):(7+Math.random()*8);
        var top=15+Math.random()*(h-70);
        var delay=Math.random()*5;
        var fontSize=isHl?(1.1+Math.random()*0.2):(0.82+Math.random()*0.35);
        var opacity=isHl?1:(0.5+Math.random()*0.3);

        var div=document.createElement('div');div.className='bullet'+(isHl?' highlight':'');
        div.style.top=top+'px';div.style.color=color;
        div.style.animationDuration=speed+'s';div.style.animationDelay=delay+'s';
        div.style.fontSize=fontSize+'rem';div.style.opacity=opacity;
        div.innerHTML='<span class="b-nick">'+(m.display_name||m.nickname)+'</span>'+esc(m.content);
        stage.appendChild(div);

        div.addEventListener('animationend',function(){this.remove();});
      }
    }

    function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    async function postMsg(){
      var content=document.getElementById('msgInput').value.trim();
      if(!content){showToast('请输入寄语','error');return;}
      var name=document.getElementById('msgName').value.trim();
      var sid=document.getElementById('msgSid').value.trim();
      if(!name&&!sid){showToast('昵称和学号至少填一个','error');return;}
      try{
        await apiFetch('/messages',{method:'POST',body:{
          content:content,
          display_name:name,
          student_id:sid,
          grade:document.getElementById('msgGrade').value.trim(),
          board:currentBoard,campus:currentCampus,
          college_id:currentCollege||null
        }});
        showToast('已提交，等待审核 ✨');
        document.getElementById('msgInput').value='';
      }catch(e){showToast(e.message,'error');}
    }
  </script>
</body>
</html>
