<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
  <div id="output">Loading...</div>
  <script src="js/main.js?v=74"></script>
  <script>
    document.getElementById('output').textContent = 'JS loaded, testing API...';
    
    fetch('/club-api/health')
      .then(r => r.json())
      .then(d => {
        document.getElementById('output').textContent = 'API OK: ' + d.status;
      })
      .catch(e => {
        document.getElementById('output').textContent = 'API FAILED: ' + e.message;
      });
  </script>
</body>
</html>
