# ============================================================
# Youth Spark - Nginx/Tengine 配置
# 挂载到 mobilevc.top/club/ 路径下
# ============================================================

# 在 server block 中添加以下配置：

# 社团网站静态资源 - /club/ 路径
location ^~ /club/ {
    alias /path/to/club-showcase/;   # 替换为实际文件路径
    index index.html;

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 目录默认文档
    location = /club/ {
        rewrite ^ /club/index.html last;
    }

    # 确保 SPA 主站不拦截 /club/ 路径
    # （如果主站有 try_files $uri $uri/ /index.html 规则）
}

# 如果主站使用 try_files 兜底，需要把 /club/ 放到前面
# 推荐在 server block 中按此顺序：
# 1. location ^~ /club/ { ... }     ← 静态资源优先
# 2. location / { try_files ... }   ← SPA 兜底
